<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 결과</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="fixed-header">
        <h1>회원가입 결과</h1>
    </header>

    <div class="form-page form-card">
    <p>입력한 회원 정보를 확인해주세요.</p>

    <table class="result-table" border="1">
        <tr>
            <th>이름</th>
            <td id="userName"></td>
        </tr>
        <tr>
            <th>아이디</th>
            <td id="userId"></td>
        </tr>
        <tr>
            <th>비밀번호</th>
            <td id="userPassword"></td>
        </tr>
        <tr>
            <th>이메일</th>
            <td id="userEmail"></td>
        </tr>
        <tr>
            <th>전화번호</th>
            <td id="userPhone"></td>
        </tr>
        <tr>
            <th>생년월일</th>
            <td id="birthDate"></td>
        </tr>
        <tr>
            <th>성별</th>
            <td id="gender"></td>
        </tr>
        <tr>
            <th>관심 분야</th>
            <td id="interest"></td>
        </tr>
        <tr>
            <th>거주 지역</th>
            <td id="city"></td>
        </tr>
        <tr>
            <th>자기소개</th>
            <td id="memo"></td>
        </tr>
        <tr>
            <th>약관동의</th>
            <td id="agree"></td>
        </tr>
    </table>

    <p>
        <a class="link-button" href="signup.html">다시 작성하기</a>
    </p>
    <p>
        <a class="link-button" href="index.html">메인으로 돌아가기</a>
    </p>
    </div>

    <script src="js/result.js"></script>
</body>
</html>
