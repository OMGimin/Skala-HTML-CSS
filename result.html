<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 결과</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>회원가입 결과</h1>
    <p>입력한 회원 정보를 확인해주세요.</p>

    <table border="1">
        <tr>
            <th>이름</th>
            <td id="userName"></td>
        </tr>
        <tr>
            <th>이메일</th>
            <td id="userEmail"></td>
        </tr>
        <tr>
            <th>전화번호</th>
            <td id="userPhone"></td>
        </tr>
        <tr>
            <th>성별</th>
            <td id="gender"></td>
        </tr>
        <tr>
            <th>관심 분야</th>
            <td id="interest"></td>
        </tr>
        <tr>
            <th>거주 지역</th>
            <td id="city"></td>
        </tr>
        <tr>
            <th>자기소개</th>
            <td id="memo"></td>
        </tr>
    </table>

    <p>
        <a href="signup.html">다시 작성하기</a>
    </p>
    <p>
        <a href="index.html">메인으로 돌아가기</a>
    </p>

    <script src="js/result.js"></script>
</body>
</html>
