<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>JavaScript 기초 실습</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>JavaScript 기초 실습</h1>
  <p>점수를 입력하고 버튼을 눌러 결과를 확인합니다.</p>

  <p>
    <label for="scoreInput">점수 입력</label><br>
    <input type="number" id="scoreInput" placeholder="0~100 사이 점수">
  </p>

  <button id="checkButton">결과 확인</button>

  <p id="resultText">결과가 여기에 표시됩니다.</p>

  <p>
    <a class="link-button" href="index.html">메인으로 돌아가기</a>
  </p>

  <script src="js/basic.js"></script>
</body>
</html>
